<script>
// --- هام جداً: ضع رابط الـ Web App الخاص بك هنا بعد عمل Deploy ---
const SCRIPT_URL = "https://script.google.com/macros/s/XXXXX/exec"; 

const states = ["39-الوادي", "01-أدرار", "02-الشلف", "03-الأغواط", "04-أم البواقي", "05-باتنة", "06-بجاية", "07-بسكرة", "08-بشار", "09-البليدة", "10-البويرة", "11-تمنراست", "12-تبسة", "13-تلمسان", "14-تيارت", "15-تيزي وزو", "16-الجزائر", "17-الجلفة", "18-جيجل", "19-سطيف", "20-سعيدة", "21-سكيكدة", "22-سيدي بلعباس", "23-عنابة", "24-قالمة", "25-قسنطينة", "26-المدية", "27-مستغانم", "28-المسيلة", "29-معسكر", "30-ورقلة", "31-وهران", "32-البيض", "33-إليزي", "34-برج بوعريريج", "35-بومرداس", "36-الطارف", "37-تندوف", "38-تيسمسيلت", "40-خنشلة", "41-سوق أهراس", "42-تيبازة", "43-ميلة", "44-عين الدفلى", "45-النعامة", "46-عين تموشنت", "47-غرداية", "48-غليزان", "49-تيميمون", "50-برج باجي مختار", "51-أولاد جلال", "52-بني عباس", "53-عين صالح", "54-عين قزام", "55-تقرت", "56-جانت", "57-المغير", "58-المنيعة"];
const stSel = document.getElementById('stSelect');
states.forEach(s => { let o = document.createElement('option'); o.text=s; o.value=s; stSel.add(o); });

// نصوص العقود (ضع نصوصك هنا)
const contracts = { 'تاجر': `...`, 'موزع': `...` };

function setMode(t){
    document.getElementById('userType').value=t;
    document.getElementById('t-dist').className=(t==='موزع'?'tab active':'tab');
    document.getElementById('t-merch').className=(t==='تاجر'?'tab active':'tab');
}

function openTerms() {
    let t = document.getElementById('userType').value;
    document.getElementById('termsTitle').innerText = "عقد الانضمام الرسمي بصفة: " + t;
    document.getElementById('termsBody').innerHTML = contracts[t];
    document.getElementById('termsModal').style.display = 'flex';
}
function closeTerms() { document.getElementById('termsModal').style.display = 'none'; }
function closeSuccess() { document.getElementById('successModal').style.display = 'none'; }

document.getElementById('wasselForm').onsubmit = async function(e){
    e.preventDefault();
    if(!document.getElementById('agreeCheck').checked) {
        alert("يجب عليك قراءة بنود العقد والموافقة عليها أولاً.");
        return;
    }
    
    const btn = document.getElementById('subBtn');
    btn.disabled = true; btn.innerText = "جاري معالجة طلبك سحابياً...";
    
    // تحويل الصور
    const idPhotoB64 = await toB64(document.getElementById('img1').files[0]);
    const workFile = document.getElementById('img2').files[0];
    const workPhotoB64 = workFile ? await toB64(workFile) : null;

    const data = {
        userType: document.getElementById('userType').value,
        fullName: this.fullName.value,
        email: this.email.value,
        phone: this.phone.value,
        dob: this.dob.value,
        state: this.state.value,
        city: this.city.value,
        zipCode: this.zipCode.value,
        idNumber: this.idNumber.value,
        workNumber: this.workNumber.value,
        idPhoto: idPhotoB64,
        workPhoto: workPhotoB64
    };

    // الإرسال إلى جوجل عبر Fetch API
    fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors", // هذا ضروري لتجنب مشاكل CORS مع جوجل
        body: JSON.stringify(data)
    }).then(() => {
        // بما أن جوجل لا تعيد JSON بسهولة في وضع no-cors، سنفترض النجاح إذا لم يحدث خطأ
        document.getElementById('finalRegNum').innerText = "تم الاستلام";
        document.getElementById('successModal').style.display = 'flex';
        document.getElementById('wasselForm').reset();
    }).catch(err => {
        alert("حدث خطأ في الاتصال.");
    }).finally(() => {
        btn.disabled = false; btn.innerText = "إرسال الطلب والموافقة";
    });
};

const toB64 = f => new Promise((res) => {
    const rd = new FileReader();
    rd.readAsDataURL(f);
    rd.onload = () => res(rd.result);
});

function copyReg() {
    navigator.clipboard.writeText(document.getElementById('finalRegNum').innerText);
    const t = document.getElementById("toast");
    t.innerText = "✅ تم نسخ الرمز! احتفظ به جيداً.";
    t.className = "show";
    setTimeout(() => t.className = "", 3500);
}
</script>
