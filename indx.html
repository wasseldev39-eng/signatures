<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام التوقيع الرقمي </title>
    <style>
        /* إعدادات الصفحة الأساسية لمنع التمرير وتغطية الشاشة */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: sans-serif;
        }

        /* حاوية الإطار لضمان التنسيق */
        .container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* تنسيق الإطار (Iframe) ليملأ الحاوية */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            /* تحسين استجابة اللمس على الهواتف */
            touch-action: none; 
        }

        /* رسالة تحميل بسيطة تظهر خلف السكريبت */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #6a1b9a;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="loading">جاري تحميل نظام التوقيع...</div>
        
        <iframe 
            src="https://script.google.com/macros/s/AKfycbywgNlocVmrtJog7qEtOCp3IhbF-oWclUFeQmbyOQORFZ_iEazX8IVrwf9xctM1q41E/exec" 
            allowfullscreen="true"
            allow="geolocation; microphone; camera; display-capture"
            title="Signature System">
        </iframe>
    </div>

</body>
</html>
